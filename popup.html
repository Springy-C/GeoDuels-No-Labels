<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GeoDuels Enhancer</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght=800;900&family=IBM+Plex+Sans:wght=400;600&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080e14;
      --surface: #0f1923;
      --border: rgba(255,255,255,0.08);
      --accent: #22d385;
      --accent-glow: rgba(34,211,133,0.25);
      --text: #e8f0f8;
      --muted: rgba(232,240,248,0.5);
      --danger: #ef4444;
    }

    body {
      width: 280px;
      background: var(--bg);
      color: var(--text);
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 13px;
      line-height: 1.5;
      overflow: hidden;
    }

    /* ── Header ── */
    .header {
      padding: 14px 16px 12px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
      background: linear-gradient(135deg, rgba(34,211,133,0.06), transparent 60%);
    }

    .logo {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, #22d385, #16a36a);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Montserrat', sans-serif;
      font-weight: 900;
      font-size: 14px;
      color: #fff;
      flex-shrink: 0;
      box-shadow: 0 4px 12px var(--accent-glow);
    }

    .header-text h1 {
      font-family: 'Montserrat', sans-serif;
      font-weight: 800;
      font-size: 13px;
      letter-spacing: 0.04em;
      color: var(--text);
    }

    .header-text p {
      font-size: 11px;
      color: var(--muted);
      margin-top: 1px;
    }

    /* ── Section ── */
    .section {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
    }

    .section-label {
      font-family: 'Montserrat', sans-serif;
      font-weight: 800;
      font-size: 9px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }

    /* ── Toggle row ── */
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 7px 0;
      cursor: pointer;
      user-select: none;
    }

    .toggle-row:hover .toggle-label { color: var(--text); }

    .toggle-label {
      font-size: 13px;
      font-weight: 600;
      color: rgba(232,240,248,0.85);
      transition: color 0.15s;
    }

    .toggle-sub {
      font-size: 11px;
      font-weight: 400;
      color: var(--muted);
      margin-top: 1px;
    }

    /* ── Toggle switch ── */
    .toggle {
      position: relative;
      width: 38px;
      height: 22px;
      flex-shrink: 0;
    }

    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
      position: absolute;
    }

    .slider {
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.08);
      border: 1px solid var(--border);
      border-radius: 999px;
      transition: background 0.2s, border-color 0.2s, box-shadow 0.2s;
      cursor: pointer;
    }

    .slider::after {
      content: '';
      position: absolute;
      top: 3px;
      left: 3px;
      width: 14px;
      height: 14px;
      background: rgba(255,255,255,0.45);
      border-radius: 50%;
      transition: transform 0.2s, background 0.2s;
    }

    .toggle input:checked + .slider {
      background: var(--accent);
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .toggle input:checked + .slider::after {
      transform: translateX(16px);
      background: #fff;
    }

    /* ── Status pill ── */
    .status {
      margin: 0 16px 14px;
      padding: 8px 12px;
      border-radius: 10px;
      background: rgba(34,211,133,0.07);
      border: 1px solid rgba(34,211,133,0.18);
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      font-weight: 600;
      color: var(--accent);
    }

    .status.inactive {
      background: rgba(255,255,255,0.03);
      border-color: var(--border);
      color: var(--muted);
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--accent);
      flex-shrink: 0;
      box-shadow: 0 0 6px var(--accent);
      animation: pulse 2s infinite;
    }

    .status.inactive .status-dot {
      background: var(--muted);
      box-shadow: none;
      animation: none;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* ── Footer ── */
    .footer {
      padding: 10px 16px;
      font-size: 10px;
      color: rgba(232,240,248,0.25);
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="logo">GD</div>
    <div class="header-text">
      <h1>GeoDuels Enhancer</h1>
      <p>Street View label control</p>
    </div>
  </div>

  <div class="section">
    <div class="section-label">Label Visibility</div>

    <label class="toggle-row">
      <div>
        <div class="toggle-label">Hide Road Names</div>
        <div class="toggle-sub">Floating chip labels only — painted road text is baked into imagery</div>
      </div>
      <div class="toggle">
        <input type="checkbox" id="hideRoadLabels" />
        <span class="slider"></span>
      </div>
    </label>
  </div>

  <div id="statusWrap" style="margin-top:12px">
    <div class="status" id="statusPill">
      <div class="status-dot"></div>
      <span id="statusText">Active on this tab</span>
    </div>
  </div>

  <div class="footer">geoduels.io · v1.9.1</div>

  <script src="popup.js"></script>
</body>
</html>
